<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Video y Métricas</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="inicio.css">
</head>
<body class="bg-light">

  <div class="container py-5">
    <h2 class="mb-5 text-center text-dark fw-bold">Resultados del Modelo</h2>

    <div class="row g-4 align-items-start mb-5">
      <div class="col-md-4">
        <div class="card shadow-sm border-0">
          <div class="card-body p-3">
            <h5 class="card-title h6 mb-3 text-muted">Video de Entrenamiento (train.mp4)</h5>
            <div class="ratio ratio-1x1 bg-black rounded overflow-hidden border">
              <video controls>
                <source src="../train.mp4" type="video/mp4">
                Tu navegador no soporta video.
              </video>
            </div>
          </div>
        </div>
      </div>
      
      <div class="col-md-8">
        <div class="card shadow-sm border-0">
          <div class="card-body p-3">
            <h5 class="card-title h6 mb-3 text-muted">Métricas de Entrenamiento (train.csv)</h5>
            <div class="table-responsive rounded border custom-table-container">
              <table class="table table-striped table-hover m-0 align-middle">
                <thead class="table-dark sticky-top">
                  <tr>
                    <th scope="col" class="ps-3">Segundo</th>
                    <th scope="col" class="text-center">Relevante</th>
                  </tr>
                </thead>
                <tbody id="tabla-body-train">
                  <tr>
                    <td colspan="2" class="text-center text-muted py-4">Cargando datos de entrenamiento...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <hr class="my-5 opacity-25">

    <div class="row g-4 align-items-start">
      <div class="col-md-4">
        <div class="card shadow-sm border-0">
          <div class="card-body p-3">
            <h5 class="card-title h6 mb-3 text-muted">Video de Prueba (test.mp4)</h5>
            <div class="ratio ratio-1x1 bg-black rounded overflow-hidden border">
              <video controls>
                <source src="../test.mp4" type="video/mp4">
                Tu navegador no soporta video.
              </video>
            </div>
          </div>
        </div>
      </div>
      
      <div class="col-md-8">
        <div class="card shadow-sm border-0">
          <div class="card-body p-3">
            <h5 class="card-title h6 mb-3 text-muted">Resultados del Modelo (../outputs/test_resultados.csv)</h5>
            <div class="table-responsive rounded border custom-table-container">
              <table class="table table-striped table-hover m-0 align-middle">
                <thead class="table-dark sticky-top">
                  <tr>
                    <th scope="col" class="ps-3">Segundo</th>
                    <th scope="col" class="text-center">Relevante</th>
                  </tr>
                </thead>
                <tbody id="tabla-body-test">
                  <tr>
                    <td colspan="2" class="text-center text-muted py-4">Cargando datos de prueba...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script src="inicio.js"></script>
</body>
</html>
